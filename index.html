<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Customizer Pro</title>
    <style>
        :root {
            --neon-purple: #bc13fe;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: #0f0c29;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .main-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 8px 32px 0 rgba(188, 19, 254, 0.37);
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: var(--neon-purple);
            font-size: 1.8rem;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(188, 19, 254, 0.8);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: #ccc;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(188, 19, 254, 0.5);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--neon-purple);
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.4);
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--neon-purple);
            border: none;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(188, 19, 254, 0.4);
        }

        button:hover {
            background: #a306e0;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(188, 19, 254, 0.6);
        }

        #output-section {
            margin-top: 30px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            display: none;
        }

        .short-url {
            color: #00ffcc;
            font-weight: bold;
            word-break: break-all;
            margin: 10px 0;
            display: block;
            text-decoration: none;
        }

        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left: 4px solid var(--neon-purple);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="main-card">
        <div id="creator-ui">
            <h1>Link Master</h1>
            <div class="input-group">
                <label>Paste Original URL</label>
                <input type="url" id="longUrl" placeholder="https://example.com/very-long-link">
            </div>
            <div class="input-group">
                <label>Custom Slug (Name)</label>
                <input type="text" id="customSlug" placeholder="my-awesome-link">
            </div>
            <button id="createBtn">Save & Generate</button>

            <div id="output-section">
                <p style="font-size: 0.8rem;">Your Customized Link:</p>
                <a id="finalUrl" class="short-url" href="#" target="_blank"></a>
                <button id="copyBtn" style="background: #333; font-size: 0.8rem; padding: 8px;">Copy Link</button>
            </div>
        </div>

        <div id="redirect-ui" style="display: none;">
            <h1>Redirecting</h1>
            <div class="loader"></div>
            <p>Please wait while we take you there...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        // Your Config
        const firebaseConfig = {
            apiKey: "AIzaSyBjv193gNBhYKjXxk9Q4iHXqcVTHeD9IXM",
            authDomain: "watch-1b375.firebaseapp.com",
            databaseURL: "https://watch-1b375-default-rtdb.firebaseio.com",
            projectId: "watch-1b375",
            storageBucket: "watch-1b375.firebasestorage.app",
            messagingSenderId: "963767546203",
            appId: "1:963767546203:web:7788de1edf0a15c5a36a7e",
            measurementId: "G-DLDJGRBRTW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- Logic: Handle Redirect ---
        const urlParams = new URLSearchParams(window.location.search);
        const linkID = urlParams.get('id');

        if (linkID) {
            document.getElementById('creator-ui').style.display = 'none';
            document.getElementById('redirect-ui').style.display = 'block';

            const dbRef = ref(db);
            get(child(dbRef, `links/${linkID}`)).then((snapshot) => {
                if (snapshot.exists()) {
                    window.location.replace(snapshot.val().url);
                } else {
                    alert("Error: Link not found!");
                    window.location.href = window.location.origin + window.location.pathname;
                }
            }).catch(err => {
                console.error(err);
                alert("Database error!");
            });
        }

        // --- Logic: Create Link ---
        document.getElementById('createBtn').addEventListener('click', async () => {
            const longUrl = document.getElementById('longUrl').value.trim();
            const slug = document.getElementById('customSlug').value.trim().toLowerCase().replace(/[^a-z0-9-]/g, '');

            if (!longUrl || !slug) {
                alert("Please enter both URL and Slug.");
                return;
            }

            try {
                // Save to Firebase
                await set(ref(db, 'links/' + slug), {
                    url: longUrl,
                    date: new Date().toISOString()
                });

                // Generate Output Link
                const generatedLink = window.location.origin + window.location.pathname + "?id=" + slug;
                document.getElementById('finalUrl').innerText = generatedLink;
                document.getElementById('finalUrl').href = generatedLink;
                document.getElementById('output-section').style.display = 'block';
            } catch (error) {
                alert("Permission Denied! Check your Firebase Rules.");
            }
        });

        // Copy Function
        document.getElementById('copyBtn').onclick = () => {
            const linkText = document.getElementById('finalUrl').innerText;
            navigator.clipboard.writeText(linkText);
            alert("Link Copied!");
        };
    </script>
</body>
</html>
